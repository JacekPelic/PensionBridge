name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: retir-ai/package-lock.json

      - name: Install dependencies
        working-directory: retir-ai
        run: npm ci

      - name: Build
        working-directory: retir-ai
        run: npx next build

      - name: Add 404.html for SPA routing
        working-directory: retir-ai
        run: cp out/index.html out/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: retir-ai/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
